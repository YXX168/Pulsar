name: Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Restore release signing key
        run: echo "${{ secrets.PULSAR_KEYSTORE_BASE64 }}" | base64 --decode > android/app/pulsar-release.jks

      - name: Build installable APK
        run: flutter build apk --release
        env:
          PULSAR_STORE_FILE: pulsar-release.jks
          PULSAR_STORE_PASSWORD: ${{ secrets.PULSAR_STORE_PASSWORD }}
          PULSAR_KEY_ALIAS: ${{ secrets.PULSAR_KEY_ALIAS }}
          PULSAR_KEY_PASSWORD: ${{ secrets.PULSAR_KEY_PASSWORD }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk Pulsar-${{ github.ref_name }}.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-APK
          path: Pulsar-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Pulsar-${{ github.ref_name }}.apk
          generate_release_notes: true
