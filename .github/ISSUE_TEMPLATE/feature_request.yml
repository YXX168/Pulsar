name: 功能建议
description: 提议符合 Pulsar 定位的新能力或交互优化
title: "[建议] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么情况下需要这项能力？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述期望的交互，而不只是按钮名称。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可接受的替代方案
