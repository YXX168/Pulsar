name: Bug 反馈
description: 报告可以稳定复现的功能、动画或布局问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿上传包含个人训练记录的备份文件。
  - type: input
    id: version
    attributes:
      label: Pulsar 版本
      placeholder: 例如 1.11.1
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 设备与 Android 版本
      placeholder: 例如 Pixel 10 Pro / Android 17 / 120Hz
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 请按顺序描述如何触发问题
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际表现
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: 截图或录屏
      description: 动画与布局问题建议附带录屏。
